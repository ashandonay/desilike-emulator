# Keys are arbitrary (e.g. scaled_base). Use --nn-model <key> to select a block.
# If --nn-model is omitted, the key defaults to --cosmo-model (must exist below).

base_unscaled:
  architecture: resnet
  hidden_dim: 24
  n_hidden: 6
  expand: 4
  dropout: 0.0
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 256
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 10
  lr_gamma: 0.85
  grad_clip: 1.0

base_scaled:
  architecture: resnet
  hidden_dim: 24
  n_hidden: 6
  expand: 4
  dropout: 0.0
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 512
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 5
  lr_gamma: 0.85
  grad_clip: 1.0

base_omegak_w_wa:
  architecture: resnet
  hidden_dim: 48
  n_hidden: 6
  expand: 4
  dropout: 0.0
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 256
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 10
  lr_gamma: 1.0
  grad_clip: 1.0

# Promoted from autoresearch (branch autoresearch/dr1-base-config): the
# validated base-cosmo architecture for the config-space dr1 dataset
# (training_data/bao/dr1/base/config). 24/6/4 ResNet sits at the
# capacity/accuracy knee (32-dim ties it; 48-dim only ~1.5x lower MSE at 4x
# params); faithful 3-seed sweeps on v2 -> mean test_mse ~2e-7 (<0.1% sigma RMS).
# Key convention: <release>_<cosmo_model>_<space>. Select with
#   --analysis bao --dataset dr1 --cosmo-model base --quantity config --nn-model dr1_base_config
dr1_base_config:
  architecture: resnet
  hidden_dim: 24
  n_hidden: 6
  expand: 4
  dropout: 0.0
  log_sigma: false
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 256
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 10
  lr_gamma: 0.85
  grad_clip: 1.0

# Promoted from autoresearch (branch autoresearch/dr1-base_omegak_w_wa-config): the
# validated EXTENDED-cosmo architecture for config-space dr1
# (training_data/bao/dr1/base_omegak_w_wa/config). Inputs are 6 (N_tracers + Om, Ok,
# w0, wa, hrdrag) vs 3 for base. The raw sigma targets span ~10 orders of magnitude
# (degenerate w0/wa/Ok cosmologies), so `log_normalize: true` is MANDATORY — without
# the symlog transform the standardized MSE is 99.95% outlier-dominated and no
# architecture trains. In log space the capacity knee is 32/6/4 (3-seed mean
# test_mse 2.08e-2; 96/6/4 is no better at 9x params and higher variance; 24 is
# undercapacity for the 6-input function). Base 10-restart schedule transfers as-is.
# Select with:
#   --analysis bao --dataset dr1 --cosmo-model base_omegak_w_wa --quantity config \
#     --nn-model dr1_base_omegak_w_wa_config
dr1_base_omegak_w_wa_config:
  architecture: resnet
  hidden_dim: 32
  n_hidden: 6
  expand: 4
  dropout: 0.0
  log_normalize: true
  log_sigma: false
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 256
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 10
  lr_gamma: 0.85
  grad_clip: 1.0
