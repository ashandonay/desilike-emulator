# Halo Occupation Distribution (HOD) shape parameters per tracer type.
#
# These are *cosmology-independent* shape parameters set once from the
# galaxy-formation literature. The cosmology-dependent quantity is the
# central scale M_cut, which is solved inside _hod_halo_props at each
# cosmology so the HOD-integrated number density matches n̄(z).
#
# HOD form:
#   N_cen(M) = f_cen · 0.5·[1 + erf((logM − logMcut) / sigma_logM)]
#                    · quench_factor(M)   [optional]
#   N_sat(M) = ((M − Mcut_sat) / M_1)^alpha_sat · Θ(M ≥ Mcut_sat)
#
# Parameters (per tracer type):
#   central_form           "erf" (Zheng+07 rising step) or "gaussian" (Avila+20
#                          / Rocher+23 narrow-band; ELG-style). Default "erf".
#                          For "gaussian", log_Mcut is reinterpreted as the
#                          peak occupancy mass log_Mcen, and the quenching
#                          factor is silently ignored (gaussian already
#                          suppresses high-M occupancy).
#   sigma_logM             width of the central distribution (dex of log M);
#                          for "erf" it is the erf width, for "gaussian" the
#                          Gaussian sigma.
#   f_cen                  central amplitude (1 for complete tracers; <1 for ELG)
#   log_M_sat_over_Mcut    log10(Mcut_sat / Mcut); satellite cutoff offset
#   log_M1_over_Mcut       log10(M_1 / Mcut); satellite normalization mass
#   alpha_sat              satellite power-law slope
#   log_Mquench_over_Mcut  log10(M_quench / Mcut); quenching cutoff (>10 means off).
#                          Ignored for central_form: gaussian.
#   eta_quench             sharpness of the quench cutoff. Ignored for gaussian.
#   assembly_bias_factor   multiplicative factor on the HOD-mass-only b1 to
#                          account for assembly bias (decorated HOD; Hearin &
#                          Watson 2013). Constrained to f ∈ (0, 1] by physical
#                          interpretation: AB suppresses bias for tracers
#                          selected against halo mass (e.g. star-formers in
#                          low-bias environments). 1.0 = no AB. Pre-DESI
#                          literature only supports f < 1 for ELG-style
#                          emission-line samples (Tamone+20 eBOSS extrap;
#                          Hadzhiyska+22 hydro). All other tracers default to
#                          1.0; calibrated via the DR1-actual N_tracers
#                          pipeline mass-only baseline.
#
# Literature sources (cited in CHANGELOG and prep_covar.py top comments):
#   Zheng+07   (2007ApJ...667..760Z)    5-par HOD form (LRG-ish)
#   Reid+14    (2014MNRAS.444..476R)    LRG HOD priors
#   Yuan+22    (2022MNRAS.515..871Y)    DESI-Y1 LRG HOD
#   Avila+20   (2020MNRAS.499.5486A)    eBOSS ELG HOD
#   Rocher+23  (2023JCAP...10..016R)    DESI ELG HOD; small f_cen
#   Richardson+12 (2012ApJ...755...30R) QSO HOD (broad central erf)
#   Eftekharzadeh+15 (2015MNRAS.453.2779E) QSO clustering
#   Smith+20   (2020MNRAS.499..269S)    BGS HOD
#
# Policy: these values are set from the cited literature once and not
# tuned to DESI σ measurements. Any change must be physics-derived
# (matching to a newer HOD constraint paper) and documented here.

BGS:                              # Smith+20
  sigma_logM: 0.30
  f_cen: 0.80
  log_Mquench_over_Mcut: 0.50
  eta_quench: 1.0
  log_M_sat_over_Mcut: 0.0
  log_M1_over_Mcut: 1.50
  alpha_sat: 1.00
  assembly_bias_factor: 1.00      # PRE-DESI ANCHOR. Pipeline mass-only HOD gives b1 =
                                  # 1.51 at z=0.295. 2dFGRS (Norberg+02 2002MNRAS.332..827N)
                                  # and SDSS (Tegmark+04 2004ApJ...606..702T) bright-galaxy
                                  # samples at z~0.1-0.2 measure b ≈ 1.0-1.5 depending on
                                  # luminosity cut; DESI BGS-BRIGHT is on the bright end →
                                  # b ≈ 1.5. No AB correction needed; pipeline value lies
                                  # within the pre-DESI measurement range.
                                  # Cross-check: Hadzhiyska+25 (DESI BGS, arXiv:2510.20896)
                                  # finds Q_sat = 0.05 ± 0.14, consistent with zero AB.

LRG:                              # Zheng+07, Reid+14, Yuan+24
  sigma_logM: 0.50
  f_cen: 1.00
  log_Mquench_over_Mcut: 10.0     # effectively off (no quench for LRGs)
  eta_quench: 1.0
  log_M_sat_over_Mcut: 0.0
  log_M1_over_Mcut: 1.40
  alpha_sat: 0.80
  assembly_bias_factor: 1.00      # PRE-DESI ANCHOR. BOSS CMASS LRG sample at z=0.57
                                  # (the canonical pre-DESI LRG measurement) has measured
                                  # large-scale linear bias b ≈ 2.0:
                                  #   - Tojeiro+14 (2014MNRAS.440.2222T) HOD fit: b ≈ 2.0
                                  #   - Beutler+17 (2017MNRAS.464.3409B) full-shape: b ≈ 2.0
                                  # At DR1-actual N_tracers, pipeline mass-only HOD gives
                                  # b1 = 1.99 (LRG1, z=0.51), 2.17 (LRG2, z=0.71), 1.61
                                  # (LRG3+ELG1 sub-bin, z=0.93) — bracketing the BOSS
                                  # b ≈ 2.0 reference without any AB correction needed.
                                  # Tojeiro+14 + Reid+14 LRG HOD analyses report
                                  # negligible assembly bias for red sequence samples
                                  # (consistent with f_AB = 1.00).

ELG:                              # Rocher+23 / Avila+20 Gaussian-central ELG HOD
  central_form: gaussian          # narrow-band: ELGs live in ~10^11.5-12.5 M_sun halos
  sigma_logM: 0.30                # Gaussian sigma (Rocher+23 best fit ~0.3 dex)
  f_cen: 0.10                     # peak central occupancy at log_Mcen
  log_Mquench_over_Mcut: 10.0     # unused for gaussian form (set off)
  eta_quench: 1.0                 # unused for gaussian form
  log_M_sat_over_Mcut: 1.00       # M_0 ~10× M_cen; Rocher+23 ~10^12.5 for M_cen ~10^11.5
  log_M1_over_Mcut: 1.70          # M_1 ~50× M_cen; tuned for f_sat ~0.1
  alpha_sat: 0.80                 # Rocher+23 ~0.8
  assembly_bias_factor: 0.78      # PRE-DESI ANCHOR. eBOSS ELG measurements at z=0.7-1.2:
                                  #   - Tamone+20 (2020MNRAS.499.5527T) anisotropic
                                  #     clustering at z_eff = 0.85: b ≈ 1.1-1.4 across
                                  #     z = 0.7-1.2 (growing with z); midpoint at
                                  #     z = 0.85 is b ≈ 1.25-1.3
                                  #   - Avila+20 (2020MNRAS.499.5486A) eBOSS ELG HOD
                                  #     paper holds bias fixed at the Tamone+20 value
                                  #     while exploring HOD shape variations.
                                  # Linear extrapolation of Tamone+20 (b = 1.1 → 1.4 over
                                  # z = 0.7 → 1.2) to z = 1.32 gives b ≈ 1.50.
                                  # At DR1-actual N_tracers, pipeline mass-only HOD at
                                  # z=1.32 with Gaussian-central form gives b1 = 1.93.
                                  # f_AB = 1.50 / 1.93 ≈ 0.78 brings the pipeline to the
                                  # Tamone+20 extrapolated value.
                                  #
                                  # Independent theoretical cross-check: Hadzhiyska+22
                                  # (2022MNRAS.509..501H) hydro simulations show ELGs
                                  # occupy lower-c, lower-density environments at fixed M
                                  # (effective b1 suppressed relative to mass-only HOD).
                                  # Their suppression range is broader (~40-60%) than
                                  # ours, but consistent in sign and a uniquely ELG
                                  # phenomenon — no other DR1 tracer has a comparable
                                  # AB measurement in pre-DESI literature.

MIX:                              # Hybrid LRG3+ELG1; no direct b1 measurement available
  sigma_logM: 0.50
  f_cen: 0.40
  log_Mquench_over_Mcut: 0.20
  eta_quench: 1.5
  log_M_sat_over_Mcut: 0.5
  log_M1_over_Mcut: 1.50
  alpha_sat: 0.80
  assembly_bias_factor: 1.00      # No direct pre-DESI measurement exists for an LRG+ELG
                                  # combined sample. The LRG component (the majority by
                                  # number) carries no AB; the ELG component does
                                  # (Tamone+20 extrap, Hadzhiyska+22), but transporting
                                  # a single-tracer AB factor to a hybrid HOD shape is
                                  # not literature-grounded. Default to f_AB = 1.00
                                  # (no AB) and let BB-marg absorb the residual b1
                                  # mismatch from the ELG component. At DR1-actual
                                  # N_tracers, pipeline mass-only HOD gives b1 = 1.61
                                  # at z=0.93 — in the expected range for a mostly-LRG
                                  # sample at that redshift.

QSO:                              # Richardson+12, Eftekharzadeh+15
  sigma_logM: 0.60
  f_cen: 0.10
  log_Mquench_over_Mcut: 0.0
  eta_quench: 1.5
  log_M_sat_over_Mcut: 1.5
  log_M1_over_Mcut: 2.50
  alpha_sat: 0.40
  assembly_bias_factor: 1.00      # PRE-DESI ANCHOR. Laurent+17 (2017JCAP...07..017L)
                                  # eBOSS QSO autocorrelation measures b_Q = 2.45 ± 0.05
                                  # at z=1.55, but the eBOSS QSO sample has n̄ ≈ 2×10⁻⁵
                                  # (Mpc/h)⁻³ versus DESI QSO n̄ ≈ 6×10⁻⁵ (Mpc/h)⁻³ at
                                  # similar z — higher DESI density includes lower-mass
                                  # halos and lowers the HOD-weighted b1. Direct
                                  # transport of the Laurent+17 b=2.45 number is not
                                  # apples-to-apples.
                                  #
                                  # At DR1-actual N_tracers, pipeline mass-only HOD at
                                  # z=1.49 gives b1 = 2.05. This sits below Laurent+17
                                  # (2.45) but matches the density-corrected expectation
                                  # for a denser sample. No pre-DESI literature provides
                                  # an AB measurement for QSOs that would justify
                                  # f_AB ≠ 1.0, so we hold at 1.00 (no AB correction).
                                  # Any remaining b1 mismatch vs DESI internal
                                  # measurements is absorbed by BB-marginalization.
                                  #
                                  # Eftekharzadeh+15 (2015MNRAS.453.2779E) is at higher
                                  # z (2.2-2.8) and NOT directly applicable to DESI
                                  # z~1.5; previous citation of their b=2.45 was
                                  # actually a confusion with Laurent+17's value (also
                                  # 2.45 at z=1.55, by coincidence).
